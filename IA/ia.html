<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f07c2a" />
    <title>MiRest con IA | DallIA</title>
    <script>
      document.documentElement.classList.add("js");
      document.documentElement.dataset.theme = localStorage.getItem("mirest-ui-theme") || "light";
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..800&family=Inter:wght@300..900&display=swap" rel="stylesheet" />
    <link rel="manifest" href="../Pwa/manifest.webmanifest" />
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/dashboard.css" />
    <link rel="stylesheet" href="../styles/premium-modules.css" />
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      /* ── Variables del módulo IA ── */
      :root {
        --ia-accent:     var(--color-accent);
        --ia-accent2:    var(--color-accent-dark);
        --ia-accent-dim: var(--color-accent-soft);
        --ia-radius:     14px;
        --ia-font-d:     var(--font-display);
        --ia-font-b:     var(--font-body);
      }

      /* ── Layout del chat ── */
      .ia-chat-wrapper {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 120px);
        min-height: 400px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--ia-radius);
        overflow: hidden;
        box-shadow: var(--shadow-card);
      }

      /* ── Área de mensajes ── */
      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scroll-behavior: smooth;
      }

      #chat-messages::-webkit-scrollbar { width: 5px; }
      #chat-messages::-webkit-scrollbar-track { background: transparent; }
      #chat-messages::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }

      /* ── Mensajes ── */
      .message {
        display: flex;
        flex-direction: column;
        max-width: 78%;
        animation: ia-msg-in .25s ease;
      }

      @keyframes ia-msg-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .message--user {
        align-self: flex-end;
        align-items: flex-end;
      }

      .message--assistant {
        align-self: flex-start;
        align-items: flex-start;
      }

      .message__bubble {
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.6;
        word-break: break-word;
      }

      .message--user .message__bubble {
        background: linear-gradient(135deg, var(--ia-accent), var(--ia-accent2));
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .message--assistant .message__bubble {
        background: var(--color-bg);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-bottom-left-radius: 4px;
      }

      .message__bubble ul {
        margin: 6px 0 0 0;
        padding-left: 18px;
      }

      .message__bubble li { margin-bottom: 4px; }

      .message__meta {
        font-size: 11px;
        color: var(--color-text-muted);
        margin-top: 4px;
        padding: 0 4px;
      }

      /* ── Mensaje de advertencia ── */
      .message--warning .message__bubble {
        background: rgba(240, 124, 42, 0.12);
        border: 1px solid rgba(240, 124, 42, 0.35);
        color: var(--color-text);
        font-size: 13px;
      }

      /* ── Typing indicator ── */
      #typing-indicator {
        display: none;
        align-self: flex-start;
        padding: 12px 18px;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: 16px;
        border-bottom-left-radius: 4px;
        gap: 5px;
        align-items: center;
      }

      #typing-indicator.visible {
        display: flex;
      }

      .typing-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--ia-accent);
        animation: ia-dot-bounce 1.2s infinite ease-in-out;
      }

      .typing-dot:nth-child(1) { animation-delay: 0s; }
      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes ia-dot-bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30%            { transform: translateY(-6px); opacity: 1; }
      }

      /* ── Área de input ── */
      .ia-input-area {
        border-top: 1px solid var(--color-border);
        padding: 14px 16px;
        background: var(--color-surface);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .ia-input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }

      #chat-input {
        flex: 1;
        resize: none;
        border: 1px solid var(--color-border);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-family: var(--ia-font-b);
        background: var(--color-bg);
        color: var(--color-text);
        line-height: 1.5;
        min-height: 44px;
        max-height: 120px;
        overflow-y: auto;
        transition: border-color .15s, box-shadow .15s;
      }

      #chat-input:focus {
        outline: none;
        border-color: var(--ia-accent);
        box-shadow: 0 0 0 3px rgba(240, 124, 42, .15);
      }

      #chat-input:disabled {
        opacity: .5;
        cursor: not-allowed;
      }

      #chat-input::placeholder { color: var(--color-text-muted); }

      /* ── Botones de acción ── */
      #btn-send {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, var(--ia-accent), var(--ia-accent2));
        color: #fff;
        cursor: pointer;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        box-shadow: 0 2px 10px rgba(240, 124, 42, .35);
        transition: transform .12s, box-shadow .12s, filter .12s;
      }

      #btn-send:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 5px 18px rgba(240, 124, 42, .5);
        filter: brightness(1.1);
      }

      #btn-send:active:not(:disabled) { transform: translateY(0); }

      #btn-send:disabled {
        opacity: .4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* ── Fila inferior del input ── */
      .ia-input-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      #char-counter {
        font-size: 12px;
        color: var(--color-text-muted);
        font-variant-numeric: tabular-nums;
      }

      #char-counter.warning { color: #f59e0b; }
      #char-counter.danger  { color: #ef4444; }

      #btn-new-chat {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 8px;
        border: 1px solid var(--color-border);
        background: var(--color-bg);
        color: var(--color-text-muted);
        font-size: 12px;
        font-weight: 600;
        font-family: var(--ia-font-b);
        cursor: pointer;
        transition: background .12s, border-color .12s, color .12s;
      }

      #btn-new-chat:hover {
        background: var(--color-surface-muted);
        border-color: var(--ia-accent);
        color: var(--ia-accent);
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .ia-chat-wrapper {
          height: calc(100vh - 90px);
          border-radius: 10px;
        }

        #chat-messages {
          padding: 16px 14px 12px;
          gap: 10px;
        }

        .message { max-width: 90%; }

        .ia-input-area { padding: 10px 12px; }
      }

      @media (max-width: 480px) {
        .message { max-width: 96%; }

        .ia-input-footer { flex-wrap: wrap; }
      }
    </style>
  </head>

  <body data-root-path="../" data-page-type="module" data-module-key="ia">
    <div class="app-shell">
      <!-- Sidebar -->
      <aside class="sidebar" id="appSidebar" aria-label="Panel lateral">
        <div class="sidebar__brand">
          <div class="brand-mark" aria-hidden="true">IA</div>
          <div class="brand-copy">
            <span class="brand-copy__eyebrow">MiRest</span>
            <strong>MiRest con IA</strong>
            <span>Dashboard administrativo</span>
          </div>
        </div>
        <nav id="sidebarNav" class="sidebar__nav" aria-label="Navegación principal"></nav>
        <div class="sidebar__footer card card--sidebar">
          <span class="sidebar__footer-label">Módulo activo</span>
          <strong>DallIA</strong>
          <p>Asistente IA con RAG para MiRest.</p>
        </div>
      </aside>

      <button class="sidebar-backdrop" id="sidebarBackdrop" type="button" aria-label="Cerrar navegación lateral"></button>

      <!-- App main -->
      <div class="app-main">
        <!-- Topbar -->
        <header class="topbar">
          <div class="topbar__lead">
            <button class="icon-button topbar__menu-toggle" id="sidebarToggle" type="button"
              aria-label="Abrir navegación lateral" aria-controls="appSidebar" aria-expanded="false">
              <i data-lucide="menu"></i>
            </button>
            <div class="topbar__copy">
              <span class="eyebrow" id="pageEyebrow">Inteligencia Artificial</span>
              <h1 id="pageTitle">DallIA</h1>
              <p id="pageSubtitle">Asistente IA con acceso a la base de conocimiento del restaurante.</p>
            </div>
          </div>
          <div class="topbar__actions">
            <div class="avatar" aria-label="Inteligencia Artificial">IA</div>
          </div>
        </header>

        <!-- Main content -->
        <main class="module-page">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="../index.html" style="color: inherit; text-decoration: none;">Dashboard</a>
            <span>/</span>
            <strong>DallIA</strong>
          </nav>

          <!-- Chat container -->
          <div class="ia-chat-wrapper">
            <!-- Messages area -->
            <div id="chat-messages" role="log" aria-live="polite" aria-label="Historial de conversación"></div>

            <!-- Typing indicator -->
            <div id="typing-indicator" aria-label="DallIA está escribiendo" aria-hidden="true">
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
            </div>

            <!-- Input area -->
            <div class="ia-input-area">
              <div class="ia-input-row">
                <textarea
                  id="chat-input"
                  maxlength="1000"
                  placeholder="Escribe tu pregunta a DallIA..."
                  rows="1"
                  aria-label="Mensaje para DallIA"
                ></textarea>
                <button id="btn-send" type="button" aria-label="Enviar mensaje">
                  <i data-lucide="send" style="width: 18px; height: 18px;"></i>
                </button>
              </div>
              <div class="ia-input-footer">
                <button id="btn-new-chat" type="button">
                  <i data-lucide="plus-circle" style="width: 13px; height: 13px;"></i>
                  Nueva conversación
                </button>
                <span id="char-counter" aria-live="polite">1000</span>
              </div>
            </div>
          </div>

          <footer class="page-footer">
            MiRest con IA · <span id="currentYear">2026</span> · Módulo DallIA.
          </footer>
        </main>
      </div>
    </div>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-fab" type="button" aria-label="Cambiar tema">
      <i data-lucide="moon"></i>
    </button>

    <!-- Shell scripts -->
    <script type="module" src="../scripts/app.js"></script>
    <!-- IA module scripts (regular, not module — ia.js uses global scope) -->
    <script src="./config.js"></script>
    <script src="./ia.js"></script>
  </body>
</html>
